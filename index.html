<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Consulta Cadastral - CNPJ</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & React DOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        corp: {
                            // Paleta Corporativa Sóbria
                            bg: '#f4f6f8', // Cinza muito claro de fundo
                            main: '#ffffff', // Branco para os cards
                            text: '#1a202c', // Texto quase preto
                            label: '#64748b', // Texto secundário/rótulos
                            primary: '#0f172a', // Azul Marinho Profundo (Marítimo)
                            secondary: '#e2e8f0', // Linhas de divisão
                            accent: '#2563eb', // Azul Brilhante apenas para ações/links
                            success: '#166534', // Verde escuro corporativo
                            successBg: '#dcfce7'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f6f8; }
        /* Scrollbar fina corporativa */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-corp-text antialiased">

    <div id="root"></div>

    <script type="text/babel">
        // --- UTILS ---
        const formatCnpj = (v) => v.replace(/\D/g, '').replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2').substring(0, 18);
        const formatCep = (v) => v ? v.replace(/\D/g, '').replace(/^(\d{5})(\d)/, '$1-$2').substring(0, 9) : '-';
        const formatCurrency = (v) => (v === null || v === undefined) ? '-' : new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        const formatPhone = (l) => (!l || l.length === 0) ? '-' : l.map(p => `(${p.ddd}) ${p.numero}`).join(' / ');

        const countFilledFields = (obj) => {
          let count = 0; if (obj === null || obj === undefined) return 0;
          if (Array.isArray(obj)) { obj.forEach(item => { count += countFilledFields(item); }); } 
          else if (typeof obj === 'object') { Object.values(obj).forEach(val => { count += countFilledFields(val); }); } 
          else { if (obj !== '' && obj !== false && obj !== null) count++; }
          return count;
        };

        // --- COMPONENTES DE UI CORPORATIVOS ---
        const InfoBlock = ({ label, value, highlight = false }) => (
            <div className="border-l-2 border-corp-secondary pl-3 py-1">
                <dt className="text-[11px] font-semibold text-corp-label uppercase tracking-wider">{label}</dt>
                <dd className={`text-sm mt-0.5 ${highlight ? 'font-bold text-corp-accent' : 'font-semibold text-corp-text'}`}>
                    {value || '-'}
                </dd>
            </div>
        );

        // --- COMPONENTE PRINCIPAL ---
        function CnpjSearch() {
          const [cnpjInput, setCnpjInput] = React.useState('');
          const [loading, setLoading] = React.useState(false);
          const [error, setError] = React.useState(null);
          const [apiData, setApiData] = React.useState(null);
          const [showRawJson, setShowRawJson] = React.useState(false);
          const [copied, setCopied] = React.useState(false);

          const handleInputChange = (e) => setCnpjInput(formatCnpj(e.target.value));

          const handleSearch = async (e) => {
            if(e) e.preventDefault();
            const cleanCnpj = cnpjInput.replace(/\D/g, '');
            if (cleanCnpj.length !== 14) { setError('Formato inválido. Requer 14 dígitos.'); return; }
            setLoading(true); setError(null); setApiData(null); setShowRawJson(false);
            try {
              const resp = await fetch(`https://publica.cnpj.ws/cnpj/${cleanCnpj}`);
              if (!resp.ok) {
                if (resp.status === 404) throw new Error('Contribuinte não localizado.');
                if (resp.status === 429) throw new Error('Excesso de requisições. Aguarde.');
                throw new Error('Falha na comunicação com a API.');
              }
              setApiData(await resp.json());
            } catch (err) { setError(err.message); } finally { setLoading(false); }
          };

          const copyToClipboard = () => {
            if (!apiData) return; navigator.clipboard.writeText(JSON.stringify(apiData, null, 2));
            setCopied(true); setTimeout(() => setCopied(false), 2000);
          };

          // --- RENDERIZADOR DINÂMICO (VISUAL RELATÓRIO) ---
          const renderDynamicData = (data, level = 0) => {
            if (data === null || data === undefined) return null;
            const padding = level > 0 ? 'pl-5 border-l border-corp-secondary' : '';
            
            if (Array.isArray(data)) {
              if (data.length === 0) return <span className="text-xs text-corp-label italic">[Lista vazia]</span>;
              return (
                <div className={`space-y-3 ${padding}`}>
                  {data.map((item, index) => (
                    <div key={index} className="bg-corp-bg/50 p-2 rounded-sm border border-corp-secondary/50">
                      <div className="text-[10px] font-bold text-corp-primary mb-1.5 uppercase"># Registro {index + 1}</div>
                      {renderDynamicData(item, level + 1)}
                    </div>
                  ))}
                </div>
              );
            }

            if (typeof data === 'object') {
              return (
                <div className={`grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-2.5 ${padding}`}>
                  {Object.entries(data).map(([key, value]) => {
                    if (value === null || value === undefined || value === '') return null;
                    const cleanKey = key.replace(/_/g, ' ');
                    
                    if (typeof value === 'object') {
                      return (
                        <div key={key} className="col-span-1 sm:col-span-2 md:col-span-3 mt-2">
                          <div className="text-xs font-bold text-corp-text uppercase tracking-tight mb-2 pb-1 border-b border-corp-secondary">
                            {cleanKey}
                          </div>
                          {renderDynamicData(value, level + 1)}
                        </div>
                      );
                    }
                    
                    return (
                      <div key={key} className="flex flex-col py-1 border-b border-corp-secondary/30 break-all">
                        <span className="text-[10px] font-medium text-corp-label capitalize">{cleanKey}</span>
                        <span className="text-xs font-semibold text-corp-text mt-0.5">
                          {typeof value === 'boolean' ? (value ? 'Sim' : 'Não') : String(value)}
                        </span>
                      </div>
                    );
                  })}
                </div>
              );
            }
            return <span className="text-xs text-corp-text">{String(data)}</span>;
          };

          return (
            <div className="min-h-screen">
              {/* HEADER SISTÊMICO */}
              <nav className="bg-corp-primary text-white shadow-md">
                  <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
                      <div className="flex items-center gap-2">
                          <div className="w-3 h-6 bg-corp-accent rounded-sm"></div>
                          <h1 className="text-lg font-bold tracking-tight">Módulo de Consulta Cadastral <span className="font-light opacity-70">| Receita Federal</span></h1>
                      </div>
                      <div className="text-xs opacity-60 font-mono">v1.0.2</div>
                  </div>
              </nav>

              <div className="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
                
                {/* PAINEL DE PESQUISA */}
                <header className="bg-corp-main shadow-sm rounded-sm border border-corp-secondary p-5 flex flex-col md:flex-row items-center gap-4">
                  <div className="flex-shrink-0 text-corp-label text-sm font-medium">Informe o documento:</div>
                  <form onSubmit={handleSearch} className="flex flex-1 flex-col sm:flex-row gap-3 w-full">
                    <input
                      type="text"
                      placeholder="00.000.000/0000-00"
                      value={cnpjInput}
                      onChange={handleInputChange}
                      disabled={loading}
                      className="flex-1 px-3.5 py-2 text-sm rounded-sm border border-corp-secondary bg-white focus:outline-none focus:ring-1 focus:ring-corp-accent focus:border-corp-accent font-mono tracking-wider transition-all placeholder:opacity-50"
                    />
                    <button
                      type="submit"
                      disabled={loading || !cnpjInput}
                      className="px-5 py-2 rounded-sm bg-corp-primary hover:bg-black text-white text-sm font-semibold shadow-sm transition-all flex items-center justify-center gap-2 min-w-[120px] disabled:opacity-50"
                    >
                      {loading ? (
                          <span className="flex items-center gap-1.5">
                              <div className="w-3 h-3 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
                              Processando
                          </span>
                      ) : 'Consultar'}
                    </button>
                  </form>
                  {error && <div className="text-xs font-semibold text-red-700 bg-red-50 px-3 py-1.5 rounded-sm border border-red-200">{error}</div>}
                </header>

                {apiData && (
                  <main className="space-y-6">
                    
                    {/* BARRA DE FERRAMENTAS DO RELATÓRIO */}
                    <div className="flex flex-wrap items-center justify-between gap-3 bg-corp-main p-3 rounded-sm border border-corp-secondary shadow-sm">
                      <div className="flex items-center gap-2">
                        <span className="text-[11px] font-bold uppercase bg-corp-bg text-corp-primary px-3 py-1.5 rounded-sm border border-corp-secondary">
                          Documento: <span className="font-mono">{apiData.estabelecimento.cnpj}</span>
                        </span>
                        <span className="text-[11px] font-medium text-corp-label">
                          ({countFilledFields(apiData)} pontos de dados recuperados)
                        </span>
                      </div>
                      <div className="flex items-center gap-2 w-full sm:w-auto text-xs">
                        <button onClick={copyToClipboard} className="flex-1 sm:flex-initial px-4 py-1.5 font-medium rounded-sm border border-corp-secondary bg-corp-main hover:bg-corp-bg transition-colors">
                          {copied ? '✓ Copiado' : 'Copiar JSON'}
                        </button>
                        <button onClick={() => setShowRawJson(!showRawJson)} className={`flex-1 sm:flex-initial px-4 py-1.5 font-medium rounded-sm ${showRawJson ? 'bg-corp-primary text-white' : 'border border-corp-secondary bg-corp-main hover:bg-corp-bg'}`}>
                          {showRawJson ? 'Ocultar Fonte' : 'Ver Código Fonte'}
                        </button>
                      </div>
                    </div>

                    {/* VIEW FONTE */}
                    {showRawJson && (
                      <div className="bg-gray-900 text-gray-300 p-4 rounded-sm font-mono text-[11px] max-h-80 overflow-y-auto shadow-inner border border-gray-700"><pre>{JSON.stringify(apiData, null, 2)}</pre></div>
                    )}

                    {/* SEÇÃO 1: DADOS GERAIS DO ESTABELECIMENTO */}
                    <section className="bg-corp-main shadow-sm rounded-sm border border-corp-secondary p-5 space-y-5">
                      <div className="border-b border-corp-secondary pb-3 flex items-center justify-between">
                        <h2 className="text-sm font-bold text-corp-text uppercase tracking-tight flex items-center gap-2">
                          <svg className="w-4 h-4 text-corp-label" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5m0 0v-3a2 2 0 012-2h2a2 2 0 012 2v3m0 0h5" /></svg>
                          Dados Identificadores e Situação Cadastral
                        </h2>
                        <span className={`px-2.5 py-1 rounded-sm text-xs font-bold uppercase ${
                          apiData.estabelecimento?.situacao_cadastral === 'Ativa' 
                            ? 'bg-corp-successBg text-corp-success' 
                            : 'bg-yellow-100 text-yellow-900'
                        }`}>
                          {apiData.estabelecimento?.situacao_cadastral || 'ND'}
                        </span>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-4">
                        <div className="md:col-span-2 lg:col-span-1"><InfoBlock label="Razão Social" value={apiData.razao_social} /></div>
                        <div><InfoBlock label="Nome Fantasia" value={apiData.estabelecimento?.nome_fantasia} /></div>
                        <div><InfoBlock label="Capital Social Registrado" value={formatCurrency(apiData.capital_social)} highlight /></div>
                        <div className="md:col-span-2"><InfoBlock label="Atividade Econômica Principal (CNAE)" value={`${apiData.estabelecimento?.cnae_principal?.id} - ${apiData.estabelecimento?.cnae_principal?.descricao}`} /></div>
                        <div>
                          <dt className="text-[11px] font-semibold text-corp-label uppercase pr-3">Inscrições Estaduais</dt>
                          <dd className="text-xs font-mono text-corp-text mt-1 space-y-0.5 max-h-20 overflow-y-auto">
                            {apiData.estabelecimento?.inscricoes_estaduais?.length > 0 ? apiData.estabelecimento.inscricoes_estaduais.map((ie) => (<div key={ie.inscricao_estadual} className="bg-corp-bg px-1.5 py-0.5 border border-corp-secondary/50">{ie.inscricao_estadual} ({ie.estado?.sigla})</div>)) : '-'}
                          </dd>
                        </div>
                      </div>
                    </section>
                    
                    {/* SEÇÃO 2: LOCALIZAÇÃO E CONTATO */}
                    <section className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="md:col-span-2 bg-corp-main shadow-sm rounded-sm border border-corp-secondary p-5 space-y-4">
                             <h3 className="text-sm font-bold text-corp-text uppercase tracking-tight flex items-center gap-2">
                                <svg className="w-4 h-4 text-corp-label" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                                Endereço Registrado
                            </h3>
                            <p className="text-sm font-medium text-corp-text bg-corp-bg p-3 border border-corp-secondary/70 rounded-sm">
                                {apiData.estabelecimento?.logradouro}, {apiData.estabelecimento?.numero} {apiData.estabelecimento?.complemento && `(${apiData.estabelecimento.complemento})`}
                                <br />
                                {apiData.estabelecimento?.bairro} — <span className="font-mono">CEP: {formatCep(apiData.estabelecimento?.cep)}</span>
                                <br />
                                <strong className="text-corp-primary">{apiData.estabelecimento?.cidade?.nome} / {apiData.estabelecimento?.estado?.sigla}</strong>
                            </p>
                        </div>
                        <div className="bg-corp-main shadow-sm rounded-sm border border-corp-secondary p-5 space-y-4">
                             <h3 className="text-sm font-bold text-corp-text uppercase tracking-tight flex items-center gap-2">
                                <svg className="w-4 h-4 text-corp-label" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1.97a18.89 18.89 0 01-18.9-18.9V5z" /></svg>
                                Contato Telefônico/Eletrônico
                            </h3>
                            <div className="space-y-2">
                                <InfoBlock label="Telefones" value={formatPhone(apiData.estabelecimento?.telefones)} />
                                <InfoBlock label="E-mail Institucional" value={apiData.estabelecimento?.email?.toLowerCase()} highlight />
                            </div>
                        </div>
                    </section>

                    {/* SEÇÃO DINÂMICA (RELATÓRIO TÉCNICO) */}
                    <section className="bg-corp-main shadow-sm rounded-sm border border-corp-secondary p-5 space-y-4">
                      <div className="border-b border-corp-secondary pb-3">
                        <h2 className="text-sm font-bold text-corp-text uppercase tracking-tight flex items-center gap-2">
                          <svg className="w-4 h-4 text-corp-label" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                          Detalhamento Técnico Completo (Estrutura Recursiva)
                        </h2>
                      </div>
                      <div className="pt-2 antialiased">
                        {renderDynamicData(apiData)}
                      </div>
                    </section>
                  </main>
                )}
                
                {/* FOOTER */}
                {!apiData && !loading && (
                    <div className="text-center py-16 text-corp-label space-y-3 bg-corp-main rounded-sm border border-corp-secondary/50">
                        <svg className="w-12 h-12 mx-auto opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        <p className="text-sm font-medium">Aguardando inserção de CNPJ válido para iniciar pesquisa.</p>
                        <p className="text-xs max-w-md mx-auto">Este sistema consulta bases públicas e renderiza a estrutura completa de dados retornada pela API, incluindo quadros societários, CNAEs secundários e histórico de optantes.</p>
                    </div>
                )}
              </div>
              
              <footer className="border-t border-corp-secondary mt-12 bg-corp-bg py-4 text-center text-[11px] text-corp-label">
                  Sistema de Apoio à Análise Cadastral - Dados provenientes da API pública cnpj.ws.
              </footer>
            </div>
          );
        }

        const container = tragedies = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<CnpjSearch />);
    </script>
</body>
</html>
